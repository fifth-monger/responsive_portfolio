        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>

            </li>
          </ul>
        </div>
      </div>
    </nav>
 
    <div class="content-page container">
      <div class="content-section connect">
        <h1 class="mb-4 text-center">Let's <em>Build</em> Together</h1>
        <h3 class="text-center">Have a project in mind? Let's make it happen!</h3>
      </div>
      <div class="content-section connect">
        <div class="row connect align-items-center mb-5">
          <div class="col-md-6 mb-4">
            <img
              src="images/skills.png"
              alt="skills"
              class="img-fluid mx-auto d-none d-md-block skills"
            />
          </div>

          <div class="col-md-6 mb-4">
            <h2 class="mb-4 fw-bolder">Send me a message</h2>
            <form name="contact" method="POST" data-netlify="true">
              <input type="hidden" name="form-name" value="contact" />
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="name"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea
                  class="form-control"
                  id="message"
                  name="message"
                  rows="4"
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn btn-branding">
                Send it →
              </button>
            </form>
          </div>
        </div>
  
        <div class="row">
          <div class="col-md-6 offset-md-6">
            <h2 class="mb-4 fw-bolder">Connect with me</h2>
            <div class="connect-wrap">
              <a
                href="https://github.com/fifth-monger"
                target="_blank"
                class="btn connect-branding first"
              ><i class="fa-brands fa-github"></i> GitHub</a>
            </div>
            <div class="connect-wrap">
              <a
                href="https://linkedin.com/in/victoria-garcia-workspace"
                target="_blank"
                class="btn connect-branding second"
              ><i class="fa-brands fa-linkedin-in"></i> LinkedIn</a>
            </div>
          </div>
        </div>
      </div>
    </div>
 <footer>
      <div class="container">
        <div
          class="contact-box justify-content-between mb-5 d-none d-md-flex align-items-center"
        >
          <div>
            <h4 class="mb-0">Work Inquiry</h4>
            <p class="footer-subtext">Let's work together</p>
          </div>
          <div>
            <a href="contact.html" class="btn footer-btn justify-content-center">Contact me</a>
          </div>
        </div>
 
        <div class="text-center mb-4">
          <a href="mailto:victoria.garcia.workspace@gmail.com" class="email-link">
            victoria.garcia.workspace@gmail.com
          </a>
        </div>
 
        <div class="social-links d-flex justify-content-center pb-2">
          <a href="https://github.com/fifth-monger" target="_blank">
            <i class="fa-brands fa-github"></i>
          </a>
          <a href="https://linkedin.com/in/victoria-garcia-workspace" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
      </div>
    </footer>
